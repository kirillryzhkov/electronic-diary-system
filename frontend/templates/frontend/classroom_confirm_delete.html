{% extends 'frontend/base.html' %}

{% block content %}
<h1 class="page-title">Удалить кабинет</h1>

<div class="card" style="max-width: 650px;">
    <p>Удалить кабинет <b>{{ object.number }}</b>?</p>

    <form method="post">
        {% csrf_token %}
        <button type="submit" class="btn btn-danger">Удалить</button>
        <a href="{% url 'frontend-classrooms' %}" class="btn btn-secondary">Отмена</a>
    </form>
</div>
{% endblock %}
